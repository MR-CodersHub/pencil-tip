<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Pencil Tip Academy of Art</title>
  
  <!-- Preload Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

  <!-- Back to Home Button -->
  <a href="index.html" class="auth-back-btn" aria-label="Back to Homepage">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>

  <!-- Main Auth Container -->
  <main class="auth-container">
    
    <!-- Left Column: Art Panel -->
    <section class="auth-art-panel" aria-label="Inspirational quote panel">
      <div class="auth-art-overlay"></div>
      
      <!-- Floating Decorative Shapes -->
      <div class="ambient-shape shape-1"></div>
      <div class="ambient-shape shape-2"></div>
      
      <div class="auth-art-content">
        <h1 class="auth-art-title">Pencil Tip</h1>
        <p class="auth-art-quote">"Art washes away from the soul the dust of everyday life."</p>
        <span class="auth-art-author">— Pablo Picasso</span>
      </div>
    </section>

    <!-- Right Column: Form Panel -->
    <section class="auth-form-panel" aria-label="Sign up form panel">
      <div class="auth-form-card">
        
        <!-- Form Header -->
        <header class="auth-header">
          <h2>Create Account</h2>
          <p>Join our vibrant artistic community</p>
        </header>

        <!-- Form -->
        <form id="signupForm" novalidate>
          
          <!-- Full Name Group -->
          <div class="auth-form-group">
            <label for="fullName" class="auth-label">Full Name</label>
            <div class="auth-input-wrapper">
              <input type="text" id="fullName" class="auth-input" placeholder="John Doe" required>
            </div>
            <span class="auth-error-msg" id="nameError" aria-live="polite"></span>
          </div>

          <!-- Email Group -->
          <div class="auth-form-group">
            <label for="email" class="auth-label">Email Address</label>
            <div class="auth-input-wrapper">
              <input type="email" id="email" class="auth-input" placeholder="name@example.com" autocomplete="email" required>
            </div>
            <span class="auth-error-msg" id="emailError" aria-live="polite"></span>
          </div>

          <!-- Mobile Number Group -->
          <div class="auth-form-group">
            <label for="mobileNumber" class="auth-label">Mobile Number</label>
            <div class="auth-input-wrapper">
              <input type="tel" id="mobileNumber" class="auth-input" placeholder="e.g. 9876543210" required>
            </div>
            <span class="auth-error-msg" id="mobileError" aria-live="polite"></span>
          </div>

          <!-- Password Group -->
          <div class="auth-form-group">
            <label for="password" class="auth-label">Password</label>
            <div class="auth-input-wrapper">
              <input type="password" id="password" class="auth-input" placeholder="••••••••" autocomplete="new-password" required>
              <button type="button" class="pwd-toggle-btn" aria-controls="password" aria-expanded="false" aria-label="Toggle password visibility">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
            
            <!-- Password Strength Meter -->
            <div class="pwd-strength-bar">
              <div class="pwd-strength-progress"></div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <span class="auth-error-msg" id="passwordError" aria-live="polite"></span>
              <span class="pwd-strength-text">Too Short</span>
            </div>
          </div>

          <!-- Confirm Password Group -->
          <div class="auth-form-group">
            <label for="confirmPassword" class="auth-label">Confirm Password</label>
            <div class="auth-input-wrapper">
              <input type="password" id="confirmPassword" class="auth-input" placeholder="••••••••" autocomplete="new-password" required>
              <button type="button" class="pwd-toggle-btn" aria-controls="confirmPassword" aria-expanded="false" aria-label="Toggle confirm password visibility">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
            <span class="auth-error-msg" id="confirmError" aria-live="polite"></span>
          </div>

          <!-- Terms & Conditions Group -->
          <div class="auth-terms-group">
            <label class="auth-terms-label">
              <input type="checkbox" id="terms" required>
              <span class="custom-checkbox"></span>
              <span>I agree to the <a href="#" class="auth-link">Terms of Service</a> and <a href="#" class="auth-link">Privacy Policy</a></span>
            </label>
            <span class="auth-error-msg" id="termsError" aria-live="polite"></span>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="auth-btn" id="submitBtn">
            <span class="auth-btn-text">Create Account</span>
            <div class="auth-spinner" aria-hidden="true"></div>
          </button>

          <!-- Switch Prompt -->
          <p class="auth-switch-prompt">
            Already have an account? <a href="login.html" class="auth-link">Login</a>
          </p>

        </form>
      </div>
    </section>

  </main>

  <!-- JS Scripts -->
  <script src="js/auth.js"></script>
</body>
</html>
